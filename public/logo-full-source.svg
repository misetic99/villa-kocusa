<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<title>Villa Koćuša logo</title>
<desc>Elegantan logotip za Villu Koćuša sa zlatnim monogramom VK unutar kruga, nazivom vile i podnaslovom apartmani.</desc>
<defs>
<linearGradient id="logoFullGold" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#A67C27"/>
<stop offset="50%" stop-color="#F0DFA0"/>
<stop offset="100%" stop-color="#A67C27"/>
</linearGradient>
</defs>

<line x1="60" y1="150" x2="248" y2="150" stroke="url(#logoFullGold)" stroke-width="1"/>
<circle cx="60" cy="150" r="2.5" fill="url(#logoFullGold)"/>
<line x1="432" y1="150" x2="620" y2="150" stroke="url(#logoFullGold)" stroke-width="1"/>
<circle cx="620" cy="150" r="2.5" fill="url(#logoFullGold)"/>

<circle cx="340" cy="150" r="72" fill="none" stroke="url(#logoFullGold)" stroke-width="1.5"/>
<circle cx="340" cy="150" r="62" fill="none" stroke="url(#logoFullGold)" stroke-width="0.5" opacity="0.6"/>

<text x="340" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="50" fill="url(#logoFullGold)">VK</text>

<line x1="300" y1="246" x2="380" y2="246" stroke="url(#logoFullGold)" stroke-width="1"/>
<rect x="336" y="242" width="8" height="8" fill="url(#logoFullGold)" transform="rotate(45 340 246)"/>

<text x="340" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" letter-spacing="4" fill="url(#logoFullGold)">VILLA KOĆUŠA</text>

<text x="340" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" letter-spacing="6" fill="#8B7355">A P A R T M A N I</text>
</svg>
